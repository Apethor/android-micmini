name: Release

# CD: ao empurrar uma tag "v*", compila o APK e cria o Release automaticamente.
#   git tag v1.1 && git push origin v1.1   ->   Release v1.1 com o APK anexado.
on:
  push:
    tags: ['v*']

permissions:
  contents: write        # necessario para criar o Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK with tag
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/micmini-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MicMini ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.apk
