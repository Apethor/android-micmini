plugins {
    id 'com.android.application'
}

android {
    namespace 'com.apethor.micmini'
    compileSdk 34

    defaultConfig {
        applicationId 'com.apethor.micmini'
        minSdk 23          // Android 6.0 (Nubia NX551J)
        targetSdk 34
        versionCode 2
        versionName '1.1'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    buildTypes {
        debug { }
        release {
            minifyEnabled false
        }
    }
}
